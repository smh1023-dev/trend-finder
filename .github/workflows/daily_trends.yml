name: Daily Trend Finder

on:
  schedule:
    # KST 07:00 = UTC 22:00 (전날)
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run trend finder
        env:
          TZ: Asia/Seoul
          PYTHONUNBUFFERED: '1'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p output
          python trend_finder.py --output-dir output

      - name: Verify output
        run: |
          ls -la output/
          if [ ! -f "output/index.html" ]; then
            echo "::error::index.html not generated"
            exit 1
          fi
          echo "✓ index.html generated"
          count=$(ls output/*.html | wc -l)
          echo "✓ Total HTML files: $count"

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp output/*.html _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
